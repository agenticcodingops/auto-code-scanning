# .pre-commit-hooks.yaml
# Hook definitions for auto-code-scanning
# Consuming repos reference these via:
#   repos:
#     - repo: https://github.com/agenticcodingops/auto-code-scanning
#       rev: v1.0.0
#       hooks:
#         - id: trivy-iac-critical

# --------------------------------------------------------------------------
# TRIVY HOOKS
# --------------------------------------------------------------------------

- id: trivy-iac-critical
  name: "Trivy IaC (CRITICAL only)"
  entry: hooks/dispatcher.sh trivy-iac-critical
  language: script
  files: ''
  exclude: '(\.terraform/|node_modules/|\.git/)'
  types: [file]
  stages: [pre-commit]
  pass_filenames: false
  verbose: true

- id: trivy-iac-full
  name: "Trivy IaC (Full Scan)"
  entry: hooks/dispatcher.sh trivy-iac-full
  language: script
  files: ''
  exclude: '(\.terraform/|node_modules/|\.git/)'
  types: [file]
  stages: [pre-push]
  pass_filenames: false
  verbose: true

