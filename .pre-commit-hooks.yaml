# --------------------------------------------------------------------------
# APP-CODE HOOKS — C# / .NET (LAYER A)
# --------------------------------------------------------------------------

- id: semgrep-csharp
  name: "Semgrep SAST (C#)"
  entry: hooks/dispatcher.sh semgrep-csharp
  language: script
  files: '\.cs$'
  exclude: '(node_modules/|/bin/|/obj/)'
  types: [file]
  stages: [pre-commit]
  pass_filenames: false
  verbose: true

- id: dotnet-format
