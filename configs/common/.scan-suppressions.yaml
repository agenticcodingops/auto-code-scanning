# ============================================================================
# CENTRALIZED SUPPRESSION REGISTRY
# auto-code-scanning
#
# This file is the SINGLE SOURCE OF TRUTH for all security scan suppressions.
# All suppressions MUST be documented here with required governance fields.
#
# REQUIRED FIELDS:
#   - rule_id: The check ID being suppressed (e.g., AVD-AWS-0057, CKV_AWS_18)
#   - tool: Which scanner (trivy, checkov, tflint)
#   - reason: Business justification for suppression (min 10 characters)
#   - owner: Email of responsible party
#   - approved_date: When suppression was approved (YYYY-MM-DD)
#   - expires_date: When suppression must be reviewed (YYYY-MM-DD, max 180 days)
#
# OPTIONAL FIELDS:
#   - file_pattern: Limit suppression to specific files (glob pattern)
#   - severity: Original severity of the finding (CRITICAL, HIGH, MEDIUM, LOW)
#   - ticket: Link to approval ticket (JIRA, etc.)
#   - approved_by: Security team approver (required for HIGH/CRITICAL)
#
# RULE ID FORMATS:
#   - Trivy: AVD-* (e.g., AVD-AWS-0057, AVD-AZU-0001)
#   - Checkov: CKV_* (e.g., CKV_AWS_18, CKV_AZURE_1, CKV_GCP_12)
#   - tflint: Any string (e.g., terraform_naming_convention)
#
# GOVERNANCE:
#   - HIGH/CRITICAL suppressions require security team approval (approved_by)
#   - All suppressions expire after 180 days maximum
#   - Quarterly reviews are mandatory (every 90 days)
#   - Run: python scripts/validate-suppressions.py to check compliance
#   - Run: .\scripts\generate-suppression-report.ps1 for audit reports
#
# ============================================================================

# Schema version for migration compatibility
schema_version: "1.0"

# Global settings
settings:
  # Maximum days before suppression expires
  max_expiry_days: 180

  # Require security approval for these severities
  require_security_approval:
    - CRITICAL
    - HIGH

  # Review frequency in days
  review_frequency_days: 90

# ============================================================================
# TRIVY SUPPRESSIONS
# IaC misconfigurations and vulnerability findings
# ============================================================================
trivy_suppressions: []
  # Example suppression:
  # - rule_id: AVD-AWS-0057
  #   tool: trivy
  #   severity: MEDIUM
  #   reason: "S3 lifecycle rules managed at composition layer via root module"
  #   file_pattern: "terraform/modules/aws/storage/s3/*.tf"
  #   owner: platform-team@company.com
  #   approved_date: "2026-02-01"
  #   expires_date: "2026-08-01"
  #   ticket: "BDCD-XXX"

# ============================================================================
# CHECKOV SUPPRESSIONS
# AWS CIS Benchmark and policy-as-code findings
# ============================================================================
checkov_suppressions: []
  # Example suppression:
  # - rule_id: CKV_AWS_18
  #   tool: checkov
  #   severity: MEDIUM
  #   reason: "S3 access logging configured at organization level via AWS Config"
  #   file_pattern: "terraform/modules/aws/storage/s3/*.tf"
  #   owner: platform-team@company.com
  #   approved_date: "2026-02-01"
  #   expires_date: "2026-08-01"
  #   approved_by: security-team@company.com
  #   ticket: "BDCD-XXX"

# ============================================================================
# TFLINT SUPPRESSIONS
# Terraform linting and best practice findings
# ============================================================================
tflint_suppressions: []
  # Example suppression:
  # - rule_id: terraform_naming_convention
  #   tool: tflint
  #   severity: LOW
  #   reason: "Legacy naming convention maintained for backwards compatibility"
  #   file_pattern: "terraform/modules/legacy/**/*.tf"
  #   owner: platform-team@company.com
  #   approved_date: "2026-02-01"
  #   expires_date: "2026-08-01"

# ============================================================================
# SUPPRESSION HISTORY
# Record of expired or removed suppressions for audit trail
# ============================================================================
suppression_history: []
  # Example history entry:
  # - rule_id: AVD-AWS-0089
  #   tool: trivy
  #   removed_date: "2026-01-15"
  #   removal_reason: "Issue resolved in module v2.0.0"
  #   original_approved_date: "2025-07-15"

# ============================================================================
# NOTES
# ============================================================================
#
# Adding a new suppression:
# 1. Run the scanner to get the exact rule_id
# 2. Document the business justification (min 10 characters)
# 3. Get approval (security team for HIGH/CRITICAL via approved_by)
# 4. Add entry to the appropriate tool section with all required fields
# 5. Run: python scripts/validate-suppressions.py
# 6. Commit with ticket reference
#
# Quarterly review process (every 90 days):
# 1. Run: .\scripts\generate-suppression-report.ps1
# 2. Review all suppressions approaching expiry (30-day warning)
# 3. Either renew with new expiry or remove suppression
# 4. Move removed entries to suppression_history for audit trail
#
# Expiry behavior:
# - Pre-commit hooks: WARN about expired suppressions (allow commit)
# - CI workflows: FAIL on expired suppressions (block merge)
#
# ============================================================================
