# ============================================================================
# autonomous-fix.yml — CALLER (drop this into a consumer repo: .github/workflows/)
#
# Thin caller for the reusable agentic fix-loop. This file owns the PRIVILEGE
# BOUNDARY (who/when); all the hardened two-job logic lives in the reusable
# workflow it `uses:` at a PINNED tag. See docs/FIX-LOOP.md + docs/SECURITY-MODEL.md.
#
# Setup (once):
#   - add `ai-autofix` + `needs-human-review` labels (setup-scanning does this)
#   - add secrets AUTOFIX_TOKEN (fine-grained PAT) + ANTHROPIC_API_KEY
#   - set fix_loop.enabled: true in scan-config.yaml
#
# Opt a PR in by adding the `ai-autofix` label, then a trusted review triggers a fix.
# ============================================================================

name: Autonomous Fix (caller)

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run the fix-loop against (maintainer-only)."
        required: true
        type: string

# Keep the caller's own token read-only; the reusable workflow manages write via
# the AUTOFIX_TOKEN secret you pass with `secrets: inherit`.
permissions:
  contents: read

jobs:
  fix:
    # PRIVILEGE BOUNDARY — only run when ALL hold:
    #   * manual dispatch (inherently maintainer-gated), OR
    #   * non-fork PR head in THIS repo, AND
    #   * the PR carries the `ai-autofix` label, AND
    #   * the trigger came from a trusted bot OR an OWNER/MEMBER/COLLABORATOR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'ai-autofix') &&
        (
          contains(fromJSON('["coderabbitai[bot]","sonarqubecloud[bot]","sonarcloud[bot]","github-actions[bot]"]'), github.event.review.user.login) ||
          contains(fromJSON('["coderabbitai[bot]","sonarqubecloud[bot]","sonarcloud[bot]","github-actions[bot]"]'), github.event.comment.user.login) ||
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) ||
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      )
    # PIN to a release tag (or SHA) — NEVER @main. Bump deliberately.
    uses: agenticcodingops/auto-code-scanning/.github/workflows/autonomous-fix.yml@v2.0.0
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      config_path: scan-config.yaml
      scanning_repo_ref: v2.0.0
    secrets: inherit
