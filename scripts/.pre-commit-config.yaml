# Standard Template - Recommended hooks (Days 31-60)
# + linting + critical security. Target: 50%+ developer adoption.
# Copy this to your repo as .pre-commit-config.yaml
#
# Adds to starter: terraform_validate, terraform_tflint, trivy-iac-critical
# Note: no-commit-to-branch removed (branch protection is a workflow
#       preference, not a security concern)
---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-json
      - id: detect-private-key

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/.scanning/configs/.tflint.hcl"

  - repo: https://github.com/agenticcodingops/auto-code-scanning
    rev: v1.0.0
    hooks:
      - id: trivy-secrets
        stages: [pre-commit]
      - id: gitleaks
        stages: [pre-commit]
      - id: trivy-iac-critical
        stages: [pre-commit]
      # ---------------------------------------------------------------
      # OPTIONAL: Snyk IaC - requires Snyk license and SNYK_TOKEN
      # To enable: npm install -g snyk && snyk auth
      # Uncomment below. Hook exits 0 (fail-open) if not configured.
      # ---------------------------------------------------------------
      # - id: snyk-iac
      #   stages: [pre-push]
