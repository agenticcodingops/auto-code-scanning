# ============================================================================
# MULTI-LANGUAGE SCANNING FRAMEWORK CONFIGURATION
# auto-code-scanning — canonical/reference config (consumers generate their own
# via scripts/setup-scan-fix from templates/scan-config/<tier>.yaml)
#
# This file defines the scanning framework configuration for all supported
# languages. Each language can be independently enabled/disabled.
#
# Usage:
#   - Enable languages by setting enabled: true
#   - Configure tool-specific settings in the tools section
#   - Reference this file from scanning scripts and CI/CD
#
# ============================================================================

# Schema version for migration compatibility
schema_version: "1.0"

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================
global:
  # Output directory for all scan results
  results_dir: ".scan-results"

  # Severity levels (in order of priority)
  severity_levels:
    - CRITICAL
    - HIGH
    - MEDIUM
    - LOW

  # Default blocking severities (blocks commit/merge)
  blocking_severities:
    - CRITICAL
    - HIGH

  # Performance targets
  performance:
    pre_commit_max_seconds: 10
    pre_push_max_seconds: 60
    per_hook_max_seconds: 5

  # Paths to exclude from all scans
  exclude_paths:
    - .git
    - .terraform
    - .scan-results
    - node_modules
    - __pycache__
    - "*.tfstate*"

# ============================================================================
# LANGUAGE CONFIGURATIONS
# ============================================================================
languages:
  # --------------------------------------------------------------------------
  # TERRAFORM (Infrastructure as Code)
  # --------------------------------------------------------------------------
  terraform:
    enabled: true
    description: "Terraform infrastructure-as-code scanning"
    file_patterns:
      - "**/*.tf"
      - "**/*.tfvars"

    tools:
      trivy:
        enabled: true
        version: ">=0.50.0"
        config_file: ".trivyignore"
        args:
          - "--severity=CRITICAL,HIGH"
          - "--exit-code=1"
          - "--skip-dirs=.terraform"
        stage: pre-commit  # Quick CRITICAL scan
        full_scan_stage: pre-push  # Full scan with MEDIUM

      checkov:
        enabled: true
        version: ">=3.0.0"
        config_file: ".checkov.yaml"
        args:
          - "--framework=terraform"
          - "--quiet"
          - "--compact"
        stage: pre-push  # Slow, run at push

      tflint:
        enabled: true
        version: ">=0.50.0"
        config_file: ".tflint.hcl"
        args:
          - "--config=.tflint.hcl"
        stage: pre-commit

      terraform_fmt:
        enabled: true
        args:
          - "-recursive"
        stage: pre-commit

      terraform_validate:
        enabled: true
        stage: pre-commit

  # --------------------------------------------------------------------------
  # POWERSHELL (Scripts)
  # --------------------------------------------------------------------------
  powershell:
    enabled: false  # Enable when ready
    description: "PowerShell script scanning"
    file_patterns:
      - "**/*.ps1"
      - "**/*.psm1"
      - "**/*.psd1"

    tools:
      psscriptanalyzer:
        enabled: true
        version: ">=1.21.0"
        config_file: "PSScriptAnalyzerSettings.psd1"
        args:
          - "-Recurse"
          - "-EnableExit"
        stage: pre-commit
        security_rules:
          - PSAvoidUsingPlainTextForPassword
          - PSAvoidUsingConvertToSecureStringWithPlainText
          - PSAvoidUsingUserNameAndPasswordParams
          - PSAvoidUsingInvokeExpression
          - PSUsePSCredentialType

  # --------------------------------------------------------------------------
  # SHELL/BASH (Scripts)
  # --------------------------------------------------------------------------
  shell:
    enabled: false  # Enable when ready
    description: "Shell and Bash script scanning"
    file_patterns:
      - "**/*.sh"
      - "**/*.bash"

    tools:
      shellcheck:
        enabled: true
        version: ">=0.9.0"
        config_file: ".shellcheckrc"
        args:
          - "--severity=warning"
          - "--format=gcc"
        stage: pre-commit

      shfmt:
        enabled: true
        version: ">=3.7.0"
        args:
          - "-i"
          - "2"  # 2-space indent
          - "-ci"  # Case indent
          - "-d"  # Diff mode (check only)
        stage: pre-commit

  # --------------------------------------------------------------------------
  # DOCKER (Containers)
  # --------------------------------------------------------------------------
  docker:
    enabled: false  # Enable when ready
    description: "Dockerfile and container image scanning"
    file_patterns:
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/*.dockerfile"

    tools:
      hadolint:
        enabled: true
        version: ">=2.12.0"
        config_file: ".hadolint.yaml"
        args:
          - "--failure-threshold=warning"
        stage: pre-commit

      trivy_image:
        enabled: true
        args:
          - "--severity=CRITICAL,HIGH"
          - "--exit-code=1"
        stage: pre-push  # Slow, run at push

  # --------------------------------------------------------------------------
  # PYTHON (Scripts and Applications)
  # --------------------------------------------------------------------------
  python:
    enabled: false  # Enable when ready
    description: "Python security and quality scanning"
    file_patterns:
      - "**/*.py"

    tools:
      bandit:
        enabled: true
        version: ">=1.7.0"
        config_file: "pyproject.toml"
        args:
          - "-r"
          - "-ll"  # Report medium and higher
        stage: pre-commit

      pylint:
        enabled: false  # Optional
        args:
          - "--errors-only"
        stage: pre-commit

      black:
        enabled: false  # Optional formatter
        args:
          - "--check"
          - "--diff"
        stage: pre-commit

  # --------------------------------------------------------------------------
  # KUBERNETES (Manifests)
  # --------------------------------------------------------------------------
  kubernetes:
    enabled: false  # Enable when ready
    description: "Kubernetes manifest scanning"
    file_patterns:
      - "**/*.yaml"
      - "**/*.yml"
    # Exclude non-k8s YAML
    exclude_patterns:
      - ".pre-commit-config.yaml"
      - ".github/**"
      - "scan-config.yaml"

    tools:
      kubeconform:
        enabled: true
        version: ">=0.6.0"
        args:
          - "-strict"
          - "-summary"
        stage: pre-commit

      kube_linter:
        enabled: true
        version: ">=0.6.0"
        args:
          - "lint"
        stage: pre-commit

      trivy_k8s:
        enabled: true
        args:
          - "--severity=CRITICAL,HIGH"
        stage: pre-push

  # --------------------------------------------------------------------------
  # C# / .NET (Application code)  — LAYER A: app-code scanning
  # Plugin per docs/ai-research/2-Generic-Scanning-Framework-Design.md
  # --------------------------------------------------------------------------
  csharp:
    enabled: false  # Enable for .NET repos (setup --languages csharp)
    description: "C#/.NET application security and quality scanning"
    file_patterns:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "**/*.sln"
    exclude_patterns:
      - "**/bin/**"
      - "**/obj/**"

    # Per-project build settings. The dotnet-format / dotnet-build hooks read
    # these so the solution path is solved by CONFIG and never hardcoded to any
    # one repo (this is the generic fix for PR #145's api/ path bug).
    build:
      solution: ""        # e.g. "api/MyApp.slnx" — empty = auto-detect nearest .sln/.slnx
      working_dir: "."    # e.g. "api" — directory to run dotnet from

    tools:
      semgrep_csharp:
        enabled: true
        version: ">=1.60.0"
        # Native-Windows path (Fall-2025); PYTHONUTF8=1 set in hook env
        args:
          - "--config=p/csharp"
          - "--error"
          - "--metrics=off"
        stage: pre-commit

      dotnet_format:
        enabled: true
        version: ">=8.0.0"
        # solution/working_dir come from languages.csharp.build (above)
        args:
          - "--verify-no-changes"
          - "--no-restore"
        stage: pre-commit

      dotnet_build:
        enabled: true
        version: ">=8.0.0"
        description: "Roslyn analyzers via build"
        args:
          - "/p:AnalysisMode=AllEnabledByDefault"
          - "--nologo"
        stage: pre-push  # Slower; full Roslyn analysis at push

  # --------------------------------------------------------------------------
  # TYPESCRIPT / JAVASCRIPT (Application code)  — LAYER A
  # --------------------------------------------------------------------------
  typescript:
    enabled: false  # Enable for TS/JS repos (setup --languages typescript)
    description: "TypeScript/JavaScript security and quality scanning"
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
    exclude_patterns:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"

    # Directory containing package.json / eslint config (for monorepos)
    build:
      working_dir: "."

    tools:
      eslint:
        enabled: true
        version: ">=8.0.0"
        config_file: ".eslintrc"
        auto_fix: true
        args:
          - "--fix"
        stage: pre-commit

      prettier:
        enabled: true
        version: ">=3.0.0"
        config_file: ".prettierrc"
        auto_fix: true
        args:
          - "--write"
        stage: pre-commit

      semgrep_typescript:
        enabled: true
        version: ">=1.60.0"
        args:
          - "--config=p/typescript"
          - "--error"
          - "--metrics=off"
        stage: pre-commit

  # --------------------------------------------------------------------------
  # SQL  — LAYER A (bonus adapter ported from PR #145)
  # --------------------------------------------------------------------------
  sql:
    enabled: false
    description: "SQL linting via SQLFluff"
    file_patterns:
      - "**/*.sql"

    tools:
      sqlfluff:
        enabled: true
        version: ">=3.0.0"
        config_file: ".sqlfluff"
        args:
          - "lint"
          - "--dialect=ansi"
        stage: pre-commit

# ============================================================================
# CI/CD INTEGRATION
# ============================================================================
ci:
  # GitHub Actions workflow file(s) that run scanning in CI. App-code consumers use
  # code-security-scan.yml; Terraform/IaC consumers use terraform-security-scan.yml
  # (or the reusable reusable-scan.yml). Informational pointer to a real workflow.
  workflow_file: ".github/workflows/code-security-scan.yml"

  # Upload results to GitHub Security tab
  sarif_upload: true

  # SARIF categories. Since 2025-07-22 GitHub rejects same tool+category SARIF
  # collisions, so every tool MUST upload under a DISTINCT category. The
  # reusable workflow composes "<category_prefix><tool>" (e.g. "scan-trivy-iac",
  # "scan-semgrep-csharp", "scan-eslint") to guarantee uniqueness per consumer.
  sarif:
    category_prefix: "scan-"

  # Fail CI on these severities
  fail_on:
    - CRITICAL
    - HIGH

  # Required checks for branch protection
  required_checks:
    - trivy-scan
    - checkov-scan
    - tflint-scan

# ============================================================================
# REPORTING
# ============================================================================
reporting:
  # Unified results format
  format: json

  # Generate SARIF for GitHub Security integration
  sarif: true

  # Historical data retention (days)
  retention_days: 90

  # Metrics collection
  metrics:
    enabled: true
    targets:
      bypass_rate_max: 5.0
      hook_pass_rate_min: 80.0
      ci_failure_reduction: 40.0

# ============================================================================
# SUPPRESSION SETTINGS
# ============================================================================
suppressions:
  # Centralized suppression file
  file: ".scan-suppressions.yaml"

  # Maximum suppression duration (days)
  max_duration_days: 180

  # Require approval for these severities
  require_approval:
    - CRITICAL
    - HIGH

  # Review frequency (days)
  review_frequency_days: 90

# ============================================================================
# FIX LOOP (LAYER B — optional agentic autonomous fix)
# Drives .github/workflows/autonomous-fix.yml and the in-session .claude bundle.
# OFF by default. Turn on with `fix_loop.enabled: true` AND the `ai-autofix`
# label on a PR. See docs/FIX-LOOP.md and docs/SECURITY-MODEL.md.
# ============================================================================
fix_loop:
  enabled: false

  # PR labels (gates the privilege boundary)
  label: "ai-autofix"                     # opt-in: only labelled PRs are auto-fixed
  human_review_label: "needs-human-review"  # applied on cap/gate/failure

  # Agent limits
  max_turns: 8        # claude-code-action --max-turns per analyze run
  max_iterations: 3   # hard cap on autofix commits per PR (.fix-attempts)

  # ALLOWLIST (not denylist): ONLY these paths may be auto-fixed. Anything
  # outside is gated to human review. Tune per consumer in scan-config.yaml.
  allowlist_paths:
    - "src/"
    - "tests/"
    - "app/"
    - "lib/"

  # GATED paths: security-sensitive areas that are NEVER auto-fixed even if they
  # fall inside an allowlist dir. Matched case-insensitively as substrings.
  gated_paths:
    - "auth"
    - "payment"
    - "crypto"
    - "security"
    - "identity"
    - "secret"
    - "credential"
    - ".github/"
    - ".claude/"
    - "hooks"
    - "lefthook.yml"
    - "scan-and-fix.ps1"
    - "scripts/"
    - ".env"
    - "LICENSE"

  # Centralized, SHA-pinned claude-code-action reference. MUST be >= v1.0.93
  # (CVE-2025-66032 / GHSA-xq4m-mc3c-vvg3). All consumers inherit this safe pin.
  claude_code_action_ref: "anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102"  # v1.0.148

  # Authoritative re-verification command in JOB B (apply-and-push). Derive from
  # languages.*.build (e.g. `dotnet build <solution>`). Empty = secret-scan only.
  # SECURITY: this is EXECUTED. It is read from the BASE ref (a PR can't change it) and
  # runs token-free, but it is still arbitrary CI code — keep it trusted. Best practice:
  # point it at a checked-in script under a gated path, e.g. "bash scripts/ci-build-verify.sh",
  # so it can't be altered in-PR without tripping the gate. See docs/SECURITY-MODEL.md §7.1.
  build_verify_cmd: ""

  # Secrets the consumer must provide (verified, never stored, by setup-scanning).
  required_secrets:
    - "AUTOFIX_TOKEN"      # fine-grained PAT: Contents RW + Pull-requests RW, this repo only
    - "ANTHROPIC_API_KEY"  # or CLAUDE_CODE_OAUTH_TOKEN
