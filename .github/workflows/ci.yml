# ============================================================================
# CI WORKFLOW - SELF TEST
# auto-code-scanning
#
# Validates this repository's own hook definitions, configs, templates,
# and runs integration tests against all test fixtures.
#
# Jobs:
#   1. lint: Validate YAML, JSON schemas, PowerShell syntax
#   2. test-hooks: Run each hook against all test fixtures
#   3. test-scripts: Run Pester tests (PowerShell) + pytest (Python)
#   4. integration: Simulate consuming repo setup + scan cycle
#   5. performance: Run performance check workflow
# ============================================================================

name: CI - Self Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # LINT
  # Validate YAML, JSON schemas, PowerShell syntax
  # ==========================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install pre-commit
        run: pip install pre-commit pyyaml

      - name: Validate .pre-commit-hooks.yaml syntax
        run: python -c "import yaml; yaml.safe_load(open('.pre-commit-hooks.yaml'))"

      - name: Validate all template configs
        run: |
          for f in templates/*/pre-commit-config.yaml; do
            echo "Validating $f..."
            python -c "import yaml; yaml.safe_load(open('$f'))"
          done

      - name: Validate cloud configs
        run: |
          for f in configs/*/.checkov.yaml; do
            echo "Validating $f..."
            python -c "import yaml; yaml.safe_load(open('$f'))"
          done
          for f in configs/*/policy-overlay.yaml; do
            echo "Validating $f..."
            python -c "import yaml; yaml.safe_load(open('$f'))"
          done

      - name: Validate noisy-checks configs
        run: |
          for f in configs/common/noisy-checks-*.yaml; do
            echo "Validating $f..."
            python -c "import yaml; yaml.safe_load(open('$f'))"
          done

      - name: Validate suppression template
        run: |
          python -c "import yaml; yaml.safe_load(open('configs/common/.scan-suppressions.yaml'))"

      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            echo "Validating $f..."
            python -c "import json; json.load(open('$f'))"
          done

      - name: "Validate Checkov configs have no check: section (blocklist)"
        run: |
          for f in configs/*/.checkov.yaml; do
            echo "Checking blocklist approach for $f..."
            if python -c "
          import yaml, sys
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          if data and 'check' in data:
              print(f'ERROR: {\"$f\"} has a check: section - must use blocklist approach')
              sys.exit(1)
          print(f'{\"$f\"} OK - blocklist approach confirmed')
          "; then
              echo "PASS: $f"
            else
              echo "FAIL: $f has allowlist (check: section)"
              exit 1
            fi
          done

  # ==========================================================================
  # TEST HOOKS
  # Run each hook against all test fixtures, verify expected outcomes
  # ==========================================================================
  test-hooks:
    name: Test Hooks (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Checkov
        run: pip install checkov

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6  # v4.1.1
        with:
          tflint_version: latest

      - name: Initialize TFLint
        # Authenticate plugin downloads with GITHUB_TOKEN (lifts the anonymous GitHub
        # API rate limit) and retry 3x with backoff on transient 5xx — same fix as
        # reusable-scan.yml.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUD: ${{ matrix.cloud }}
        run: |
          for attempt in 1 2 3; do
            if tflint --init --config="configs/${CLOUD}/.tflint.hcl"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "tflint --init failed after 3 attempts" >&2
              exit 1
            fi
            echo "tflint --init attempt ${attempt} failed; retrying in $((attempt * 5))s..." >&2
            sleep "$((attempt * 5))"
          done

      - name: Test terraform-valid fixture passes all scans
        run: |
          FIXTURE="tests/fixtures/terraform-valid/"
          if [ -d "${FIXTURE}${{ matrix.cloud }}" ]; then
            FIXTURE="${FIXTURE}${{ matrix.cloud }}"
          fi

          echo "Testing clean fixture: $FIXTURE"

          # trivy-iac-critical should pass (trivy config has no vuln DB, use --skip-check-update)
          trivy config "$FIXTURE" --severity CRITICAL --exit-code 1 --quiet --skip-check-update 2>/dev/null
          echo "PASS: trivy-iac-critical on clean fixture"

          # trivy-secrets should pass
          trivy fs "$FIXTURE" --scanners secret --severity HIGH,CRITICAL --exit-code 1 --quiet 2>/dev/null
          echo "PASS: trivy-secrets on clean fixture"

          # checkov should pass
          checkov -d "$FIXTURE" --config-file configs/${{ matrix.cloud }}/.checkov.yaml --quiet 2>/dev/null || true
          echo "PASS: checkov on clean fixture"

      - name: Test terraform-critical fixture fails Trivy CRITICAL scan
        run: |
          FIXTURE="tests/fixtures/terraform-critical/"
          if [ -d "${FIXTURE}${{ matrix.cloud }}" ]; then
            FIXTURE="${FIXTURE}${{ matrix.cloud }}"
          fi

          if [ -d "$FIXTURE" ]; then
            echo "Testing critical fixture: $FIXTURE"
            if trivy config "$FIXTURE" --severity CRITICAL --exit-code 1 --quiet --skip-check-update 2>/dev/null; then
              echo "WARNING: Expected CRITICAL findings but scan passed (fixture may need update)"
            else
              echo "PASS: trivy-iac-critical correctly detected CRITICAL findings"
            fi
          else
            echo "SKIP: No critical fixture for ${{ matrix.cloud }}"
          fi

      - name: Test terraform-secret fixture triggers secret detection
        if: matrix.cloud == 'aws'
        run: |
          FIXTURE="tests/fixtures/terraform-secret/"
          if [ -d "$FIXTURE" ]; then
            echo "Testing secret fixture: $FIXTURE"
            if trivy fs "$FIXTURE" --scanners secret --severity HIGH,CRITICAL --exit-code 1 --quiet 2>/dev/null; then
              echo "WARNING: Expected secret findings but scan passed (fixture may need update)"
            else
              echo "PASS: trivy-secrets correctly detected hardcoded secret"
            fi
          fi

      - name: Test provider-specific fail fixture
        run: |
          FIXTURE="tests/fixtures/terraform-${{ matrix.cloud }}-fail/"
          if [ -d "$FIXTURE" ]; then
            echo "Testing fail fixture: $FIXTURE"
            if trivy config "$FIXTURE" --severity CRITICAL,HIGH --exit-code 1 --quiet --skip-check-update 2>/dev/null; then
              echo "WARNING: Expected findings but scan passed"
            else
              echo "PASS: trivy correctly detected issues in ${{ matrix.cloud }}-fail fixture"
            fi

            if ! checkov -d "$FIXTURE" --config-file configs/${{ matrix.cloud }}/.checkov.yaml --quiet 2>/dev/null; then
              echo "PASS: checkov correctly detected issues in ${{ matrix.cloud }}-fail fixture"
            else
              echo "WARNING: Expected checkov findings but scan passed"
            fi
          else
            echo "SKIP: No fail fixture for ${{ matrix.cloud }}"
          fi

  # ==========================================================================
  # TEST SCRIPTS
  # Run Pester (PowerShell) and pytest (Python) tests
  # ==========================================================================
  test-scripts:
    name: Test Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: |
          pip install pytest pytest-cov pyyaml

      - name: Run Python tests
        run: |
          if [ -d "tests/python" ]; then
            pytest tests/python/ -v --tb=short
          else
            echo "No Python tests found (tests/python/ not yet created)"
          fi

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (Test-Path "tests/unit/*.Tests.ps1") {
            # Remove pre-loaded Pester to avoid version conflicts
            Get-Module Pester | Remove-Module -Force
            Import-Module Pester -MinimumVersion 5.0 -Force
            $config = New-PesterConfiguration
            $config.Run.Path = "tests/unit/"
            $config.Run.Exit = $true
            $config.Output.Verbosity = "Detailed"
            Invoke-Pester -Configuration $config
          } else {
            Write-Host "No Pester tests found"
          }

  # ==========================================================================
  # INTEGRATION
  # Simulate consuming repo setup + scan cycle
  # ==========================================================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test-hooks]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install tools
        run: |
          pip install pre-commit pyyaml
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Simulate consuming repo setup
        run: |
          # Create a temporary consuming repo
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"

          # Copy starter template
          cp "$GITHUB_WORKSPACE/templates/starter/pre-commit-config.yaml" .pre-commit-config.yaml

          # Create a minimal valid Terraform file
          mkdir -p terraform
          cat > terraform/main.tf << 'EOF'
          terraform {
            required_version = ">= 1.0"
          }
          EOF

          # Verify template is valid YAML
          python -c "import yaml; yaml.safe_load(open('.pre-commit-config.yaml'))"
          echo "PASS: Starter template is valid YAML"

          # Verify config copy simulation
          mkdir -p .scanning/configs
          cp "$GITHUB_WORKSPACE/configs/aws/.checkov.yaml" .scanning/configs/.checkov.yaml
          cp "$GITHUB_WORKSPACE/configs/aws/.tflint.hcl" .scanning/configs/.tflint.hcl
          echo "PASS: Config copy simulation successful"

          # Clean up
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TMPDIR"

  # ==========================================================================
  # PERFORMANCE
  # Delegate to performance-check workflow
  # ==========================================================================
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Time trivy-iac-critical
        run: |
          START=$(date +%s%N)
          trivy config tests/fixtures/terraform-valid/ --severity CRITICAL --exit-code 1 --quiet --skip-check-update 2>/dev/null || true
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "trivy-iac-critical: ${ELAPSED}ms"
          if [ $ELAPSED -gt 5000 ]; then
            echo "::error::Hook exceeds 5 second threshold"
            exit 1
          fi
