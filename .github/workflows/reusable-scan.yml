# ============================================================================
# REUSABLE SECURITY SCANNING WORKFLOW
# auto-code-scanning
#
# Reusable workflow for consuming repos. Called via workflow_call trigger.
# Runs Trivy, Checkov, and tflint scans with SARIF upload and PR comments.
#
# Usage in consuming repo:
#   jobs:
#     security-scan:
#       uses: {org}/auto-code-scanning/.github/workflows/reusable-scan.yml@v1.0.0
#       with:
#         terraform-directory: "terraform/"
#         cloud-provider: "aws"
#       permissions:
#         contents: read
#         security-events: write
#         pull-requests: write
# ============================================================================

name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      terraform-directory:
        description: "Root directory containing Terraform files"
        type: string
        required: false
        default: "."
      cloud-provider:
        description: "Cloud provider: aws, azure, or gcp"
        type: string
        required: true
      severity:
        description: "Comma-separated severity filter (default per FR-024: CRITICAL,HIGH)"
        type: string
        required: false
        default: "CRITICAL,HIGH"
      scanning-repo-ref:
        description: "Git ref for the scanning repo checkout (tag, branch, or SHA)"
        type: string
        required: false
        default: "v1.0.0"
      fail-on-findings:
        description: "Whether findings cause workflow failure"
        type: boolean
        required: false
        default: true
      upload-sarif:
        description: "Upload SARIF to GitHub Code Scanning"
        type: boolean
        required: false
        default: true
      post-pr-comment:
        description: "Post findings summary as PR comment"
        type: boolean
        required: false
        default: true
      apply-suppressions:
        description: "Apply .scan-suppressions.yaml filtering"
        type: boolean
        required: false
        default: true
      apply-baseline:
        description: "Filter baseline findings"
        type: boolean
        required: false
        default: true
      enable-snyk:
        description: "Enable optional Snyk IaC scan (requires SNYK_TOKEN secret)"
        type: boolean
        required: false
        default: false
      upload-metrics:
        description: "Upload metrics as artifact"
        type: boolean
        required: false
        default: true
    outputs:
      findings-count:
        description: "Total findings after filtering"
        value: ${{ jobs.aggregate.outputs.findings-count }}
      critical-count:
        description: "CRITICAL findings count"
        value: ${{ jobs.aggregate.outputs.critical-count }}
      high-count:
        description: "HIGH findings count"
        value: ${{ jobs.aggregate.outputs.high-count }}
      scan-passed:
        description: "true or false"
        value: ${{ jobs.aggregate.outputs.scan-passed }}
      sarif-uploaded:
        description: "true or false"
        value: ${{ jobs.sarif-upload.outputs.sarif-uploaded }}
    secrets:
      SNYK_TOKEN:
        description: "Snyk API token for IaC scanning (optional)"
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # SETUP
  # Install tools, download configs
  # ==========================================================================
  setup:
    name: Setup Scanning Tools
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      config-path: ${{ steps.config.outputs.config-path }}
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Checkout scanning repo configs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository_owner }}/auto-code-scanning
          ref: ${{ inputs.scanning-repo-ref }}
          path: .scanning-repo
          sparse-checkout: |
            configs/${{ inputs.cloud-provider }}
            configs/common

      - name: Copy configs to .scanning/configs
        id: config
        run: |
          mkdir -p .scanning/configs
          cp .scanning-repo/configs/${{ inputs.cloud-provider }}/.checkov.yaml .scanning/configs/.checkov.yaml
          cp .scanning-repo/configs/${{ inputs.cloud-provider }}/.tflint.hcl .scanning/configs/.tflint.hcl
          cp .scanning-repo/configs/${{ inputs.cloud-provider }}/policy-overlay.yaml .scanning/configs/policy-overlay.yaml 2>/dev/null || true
          cp .scanning-repo/configs/common/.trivyignore .scanning/configs/.trivyignore 2>/dev/null || true
          echo "config-path=.scanning/configs" >> $GITHUB_OUTPUT

      - name: Upload config artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scanning-configs
          path: .scanning/configs/
          # The configs are dotfiles (.tflint.hcl, .checkov.yaml, .trivyignore); upload-artifact@v4
          # excludes hidden files by default, which left the tflint job with no config.
          include-hidden-files: true
          retention-days: 1

  # ==========================================================================
  # TRIVY IaC SCAN
  # ==========================================================================
  scan-trivy:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download configs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: scanning-configs
          path: .scanning/configs/

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          version: "v0.71.0"  # pin: the action's default (v0.65.0) fails to install on the runner
          scan-type: config
          scan-ref: ${{ inputs.terraform-directory }}
          severity: ${{ inputs.severity }}
          exit-code: "1"
          format: json
          output: trivy-iac-results.json
          trivyignores: .scanning/configs/.trivyignore
          skip-dirs: ".terraform,node_modules,.git"
        continue-on-error: true

      - name: Generate Trivy IaC SARIF
        if: always()
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          version: "v0.71.0"  # pin: the action's default (v0.65.0) fails to install on the runner
          scan-type: config
          scan-ref: ${{ inputs.terraform-directory }}
          severity: ${{ inputs.severity }}
          exit-code: "0"
          format: sarif
          output: trivy-iac-results.sarif
          trivyignores: .scanning/configs/.trivyignore
          skip-dirs: ".terraform,node_modules,.git"

      - name: Run Trivy secret scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          version: "v0.71.0"  # pin: the action's default (v0.65.0) fails to install on the runner
          scan-type: fs
          scanners: secret
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: json
          output: trivy-secrets-results.json
        continue-on-error: true

      - name: Generate Trivy secrets SARIF
        if: always()
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          version: "v0.71.0"  # pin: the action's default (v0.65.0) fails to install on the runner
          scan-type: fs
          scanners: secret
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: sarif
          output: trivy-secrets-results.sarif

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-results
          path: |
            trivy-iac-results.json
            trivy-iac-results.sarif
            trivy-secrets-results.json
            trivy-secrets-results.sarif
          retention-days: 1

  # ==========================================================================
  # CHECKOV POLICY SCAN
  # ==========================================================================
  scan-checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download configs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: scanning-configs
          path: .scanning/configs/

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf  # v12.1347.0
        with:
          directory: ${{ inputs.terraform-directory }}
          config_file: .scanning/configs/.checkov.yaml
          framework: terraform
          output_format: cli,json,sarif
          output_file_path: console,checkov-results.json,checkov-results.sarif
          soft_fail: true
          download_external_modules: false
        continue-on-error: true

      - name: Generate remediation URLs
        if: always()
        run: |
          if [ -f checkov-results.json ]; then
            python3 -c "
          import json, sys

          try:
              with open('checkov-results.json', 'r') as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError):
              sys.exit(0)

          results = data if isinstance(data, list) else [data]
          for result in results:
              for check_type in ['passed_checks', 'failed_checks']:
                  checks = result.get(check_type, [])
                  for check in checks:
                      check_id = check.get('check_id', '')
                      if check_id.startswith('CKV_'):
                          check['guideline'] = f'https://docs.checkov.io/docs/{check_id}'

          with open('checkov-results.json', 'w') as f:
              json.dump(results if len(results) > 1 else results[0], f, indent=2)
          "
          fi

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: checkov-results
          path: |
            checkov-results.json
            checkov-results.sarif
          retention-days: 1

  # ==========================================================================
  # TFLINT SCAN
  # ==========================================================================
  scan-tflint:
    name: TFLint Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download configs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: scanning-configs
          path: .scanning/configs/

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6  # v4.1.1
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init --config=.scanning/configs/.tflint.hcl

      - name: Run TFLint
        id: tflint
        run: |
          EXIT_CODE=0
          TFLINT_OUTPUT=""
          SCAN_DIR="${{ inputs.terraform-directory }}"

          while IFS= read -r dir; do
            echo "::group::Scanning $dir"
            if ! tflint --config=.scanning/configs/.tflint.hcl --chdir="$dir" --format=json > "tflint-${dir//\//-}.json" 2>&1; then
              EXIT_CODE=1
            fi
            echo "::endgroup::"
          done < <(find "$SCAN_DIR" -name "*.tf" -type f -exec dirname {} \; | sort -u)

          # Merge tflint JSON results
          python3 -c "
          import json, glob, os

          all_issues = []
          for f in glob.glob('tflint-*.json'):
              try:
                  with open(f) as fh:
                      data = json.load(fh)
                      if isinstance(data, dict) and 'issues' in data:
                          all_issues.extend(data['issues'])
              except (json.JSONDecodeError, FileNotFoundError):
                  pass

          with open('tflint-results.json', 'w') as f:
              json.dump({'issues': all_issues, 'errors': []}, f, indent=2)
          " || true

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload TFLint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tflint-results
          path: tflint-results.json
          retention-days: 1

  # ==========================================================================
  # SNYK IaC SCAN (OPTIONAL)
  # Only runs when enable-snyk is true and SNYK_TOKEN secret is provided
  # ==========================================================================
  scan-snyk:
    name: Snyk IaC Scan (Optional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: setup
    if: ${{ inputs.enable-snyk }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk IaC scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk iac test ${{ inputs.terraform-directory }} \
            --json \
            --json-file-output=snyk-iac-results.json \
            --severity-threshold=low \
            2>&1 || true

      - name: Generate Snyk SARIF
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk iac test ${{ inputs.terraform-directory }} \
            --sarif-file-output=snyk-iac-results.sarif \
            --severity-threshold=low \
            2>&1 || true

      - name: Upload Snyk results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: snyk-results
          path: |
            snyk-iac-results.json
            snyk-iac-results.sarif
          retention-days: 1

  # ==========================================================================
  # AGGREGATE
  # Merge results, deduplicate, apply suppressions/baseline
  # ==========================================================================
  aggregate:
    name: Aggregate Results
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-trivy, scan-checkov, scan-tflint, scan-snyk]
    if: always()
    outputs:
      findings-count: ${{ steps.aggregate.outputs.findings-count }}
      critical-count: ${{ steps.aggregate.outputs.critical-count }}
      high-count: ${{ steps.aggregate.outputs.high-count }}
      scan-passed: ${{ steps.aggregate.outputs.scan-passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: scan-artifacts/

      - name: Aggregate and filter results
        id: aggregate
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          import hashlib
          import sys
          from datetime import datetime, timezone

          findings = []
          trivy_iac = {}
          trivy_secrets = {}
          checkov_data = {}
          tflint_data = {}
          snyk_data = {}

          # Load Trivy IaC results
          trivy_iac_path = "scan-artifacts/trivy-results/trivy-iac-results.json"
          if os.path.exists(trivy_iac_path):
              try:
                  with open(trivy_iac_path) as f:
                      trivy_iac = json.load(f)
              except json.JSONDecodeError:
                  pass

          # Load Trivy secrets results
          trivy_secrets_path = "scan-artifacts/trivy-results/trivy-secrets-results.json"
          if os.path.exists(trivy_secrets_path):
              try:
                  with open(trivy_secrets_path) as f:
                      trivy_secrets = json.load(f)
              except json.JSONDecodeError:
                  pass

          # Load Checkov results
          checkov_path = "scan-artifacts/checkov-results/checkov-results.json"
          if os.path.exists(checkov_path):
              try:
                  with open(checkov_path) as f:
                      checkov_data = json.load(f)
              except json.JSONDecodeError:
                  pass

          # Load TFLint results
          tflint_path = "scan-artifacts/tflint-results/tflint-results.json"
          if os.path.exists(tflint_path):
              try:
                  with open(tflint_path) as f:
                      tflint_data = json.load(f)
              except json.JSONDecodeError:
                  pass

          # Load Snyk IaC results
          snyk_path = "scan-artifacts/snyk-results/snyk-iac-results.json"
          if os.path.exists(snyk_path):
              try:
                  with open(snyk_path) as f:
                      snyk_data = json.load(f)
              except json.JSONDecodeError:
                  pass

          # Parse Trivy IaC findings
          trivy_results = trivy_iac.get("Results", [])
          for result in trivy_results:
              for vuln in result.get("Misconfigurations", []):
                  findings.append({
                      "tool": "trivy",
                      "rule_id": vuln.get("AVDID", vuln.get("ID", "")),
                      "severity": vuln.get("Severity", "UNKNOWN").upper(),
                      "title": vuln.get("Title", ""),
                      "message": vuln.get("Message", ""),
                      "file": result.get("Target", ""),
                      "line": vuln.get("CauseMetadata", {}).get("StartLine", 0),
                      "resource": vuln.get("CauseMetadata", {}).get("Resource", ""),
                      "remediation": vuln.get("Resolution", ""),
                      "remediation_url": vuln.get("PrimaryURL", ""),
                      "detected_by": ["trivy"],
                      "suppressed": False,
                      "baseline": False
                  })

          # Parse Checkov findings
          checkov_results = checkov_data if isinstance(checkov_data, list) else [checkov_data]
          for result in checkov_results:
              for check in result.get("failed_checks", []):
                  check_id = check.get("check_id", "")
                  remediation_url = f"https://docs.checkov.io/docs/{check_id}" if check_id.startswith("CKV_") else None
                  severity = check.get("severity", "MEDIUM")
                  if severity:
                      severity = severity.upper()
                  else:
                      severity = "MEDIUM"
                  findings.append({
                      "tool": "checkov",
                      "rule_id": check_id,
                      "severity": severity,
                      "title": check.get("check_id", ""),
                      "message": check.get("check_result", {}).get("message", check.get("name", "")),
                      "file": check.get("file_path", ""),
                      "line": check.get("file_line_range", [0])[0] if check.get("file_line_range") else 0,
                      "resource": check.get("resource", ""),
                      "remediation": check.get("guideline", ""),
                      "remediation_url": remediation_url,
                      "detected_by": ["checkov"],
                      "suppressed": False,
                      "baseline": False
                  })

          # Parse TFLint findings
          tflint_severity_map = {"error": "HIGH", "warning": "MEDIUM", "notice": "LOW"}
          for issue in tflint_data.get("issues", []):
              rule_name = issue.get("rule", {}).get("name", "")
              tflint_sev = issue.get("rule", {}).get("severity", "warning")
              findings.append({
                  "tool": "tflint",
                  "rule_id": rule_name,
                  "severity": tflint_severity_map.get(tflint_sev, "MEDIUM"),
                  "title": rule_name,
                  "message": issue.get("message", ""),
                  "file": issue.get("range", {}).get("filename", ""),
                  "line": issue.get("range", {}).get("start", {}).get("line", 0),
                  "resource": "",
                  "remediation": "",
                  "remediation_url": f"https://github.com/terraform-linters/tflint/blob/master/docs/rules/{rule_name}.md" if rule_name.startswith("terraform_") else None,
                  "detected_by": ["tflint"],
                  "suppressed": False,
                  "baseline": False
              })

          # Parse Snyk IaC findings
          snyk_severity_map = {"critical": "CRITICAL", "high": "HIGH", "medium": "MEDIUM", "low": "LOW"}
          for issue in snyk_data.get("infrastructureAsCodeIssues", []):
              snyk_sev = issue.get("severity", "medium").lower()
              target_file = issue.get("targetFile", "")
              issue_id = issue.get("id", issue.get("publicId", ""))
              findings.append({
                  "tool": "snyk",
                  "rule_id": issue_id,
                  "severity": snyk_severity_map.get(snyk_sev, "MEDIUM"),
                  "title": issue.get("title", ""),
                  "message": issue.get("iacDescription", {}).get("issue", issue.get("title", "")),
                  "file": target_file,
                  "line": issue.get("lineNumber", 0),
                  "resource": issue.get("resolve", ""),
                  "remediation": issue.get("iacDescription", {}).get("resolve", ""),
                  "remediation_url": issue.get("documentation", None),
                  "detected_by": ["snyk"],
                  "suppressed": False,
                  "baseline": False
              })

          # Apply suppressions
          suppressions_applied = 0
          apply_suppressions = "${{ inputs.apply-suppressions }}" == "true"
          if apply_suppressions and os.path.exists(".scan-suppressions.yaml"):
              try:
                  import yaml
                  with open(".scan-suppressions.yaml") as f:
                      supp_data = yaml.safe_load(f) or {}

                  now = datetime.now(timezone.utc).date()
                  active_suppressions = set()
                  for section in ["trivy_suppressions", "checkov_suppressions", "tflint_suppressions", "snyk_suppressions"]:
                      for entry in supp_data.get(section, []) or []:
                          expires = entry.get("expires_date", "")
                          if expires:
                              try:
                                  exp_date = datetime.strptime(expires, "%Y-%m-%d").date()
                                  if exp_date >= now:
                                      key = (entry.get("rule_id", ""), entry.get("tool", ""))
                                      active_suppressions.add(key)
                              except ValueError:
                                  pass

                  for finding in findings:
                      key = (finding["rule_id"], finding["tool"])
                      if key in active_suppressions:
                          finding["suppressed"] = True
                          suppressions_applied += 1
              except ImportError:
                  pass
              except Exception:
                  pass

          # Apply baseline
          baseline_filtered = 0
          apply_baseline = "${{ inputs.apply-baseline }}" == "true"
          if apply_baseline and os.path.exists(".scan-baseline/baseline.json"):
              try:
                  with open(".scan-baseline/baseline.json") as f:
                      baseline = json.load(f)
                  baseline_hashes = {e["hash"] for e in baseline.get("entries", [])}
                  for finding in findings:
                      h = hashlib.sha256(f"{finding['rule_id']}|{finding['file']}".encode()).hexdigest()
                      if h in baseline_hashes:
                          finding["baseline"] = True
                          baseline_filtered += 1
              except (json.JSONDecodeError, FileNotFoundError, KeyError):
                  pass

          # Filter active findings (not suppressed AND not baselined)
          active = [f for f in findings if not f["suppressed"] and not f["baseline"]]

          # Count by severity
          severity_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
          for f in active:
              sev = f["severity"]
              if sev in severity_counts:
                  severity_counts[sev] += 1

          total = len(active)
          critical = severity_counts["CRITICAL"]
          high = severity_counts["HIGH"]

          fail_on = "${{ inputs.fail-on-findings }}" == "true"
          # Gate on the BLOCKING severities (CRITICAL + HIGH) only — lint / medium / low
          # findings are reported (SARIF + PR comment) but do NOT fail the check, matching
          # the `severity: CRITICAL,HIGH` the scanners are configured with.
          blocking = critical + high
          passed = "true" if (blocking == 0 or not fail_on) else "false"

          # Write aggregated results
          output = {
              "total_findings": total,
              "by_severity": severity_counts,
              "suppressions_applied": suppressions_applied,
              "baseline_filtered": baseline_filtered,
              "findings": findings
          }
          os.makedirs(".scan-results", exist_ok=True)
          with open(".scan-results/aggregated.json", "w") as f:
              json.dump(output, f, indent=2)

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"findings-count={total}\n")
              f.write(f"critical-count={critical}\n")
              f.write(f"high-count={high}\n")
              f.write(f"scan-passed={passed}\n")

          print(f"Total active findings: {total}")
          print(f"  CRITICAL: {critical}")
          print(f"  HIGH: {high}")
          print(f"  MEDIUM: {severity_counts['MEDIUM']}")
          print(f"  LOW: {severity_counts['LOW']}")
          print(f"  Suppressed: {suppressions_applied}")
          print(f"  Baselined: {baseline_filtered}")

          if passed == "false":
              sys.exit(1)
          PYTHON_SCRIPT

      - name: Upload aggregated results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: aggregated-results
          path: .scan-results/aggregated.json
          retention-days: 1

  # ==========================================================================
  # SARIF UPLOAD
  # Upload SARIF to GitHub Code Scanning (with truncation)
  # ==========================================================================
  sarif-upload:
    name: Upload SARIF
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    needs: [scan-trivy, scan-checkov, scan-snyk, aggregate]
    if: always() && inputs.upload-sarif
    outputs:
      sarif-uploaded: ${{ steps.set-output.outputs.sarif-uploaded }}
    steps:
      - name: Download scan results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: scan-artifacts/

      - name: Truncate SARIF if needed
        id: truncate
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import os

          MAX_SIZE_BYTES = 25 * 1024 * 1024  # 25MB
          MAX_RESULTS = 5000
          SEVERITY_ORDER = {"critical": 0, "error": 1, "warning": 2, "note": 3, "none": 4}

          for sarif_file in [
              "scan-artifacts/trivy-results/trivy-iac-results.sarif",
              "scan-artifacts/trivy-results/trivy-secrets-results.sarif",
              "scan-artifacts/checkov-results/checkov-results.sarif",
              "scan-artifacts/snyk-results/snyk-iac-results.sarif"
          ]:
              if not os.path.exists(sarif_file):
                  continue

              try:
                  with open(sarif_file) as f:
                      sarif = json.load(f)
              except (json.JSONDecodeError, FileNotFoundError):
                  continue

              total_results = 0
              for run in sarif.get("runs", []):
                  total_results += len(run.get("results", []))

              file_size = os.path.getsize(sarif_file)

              if file_size <= MAX_SIZE_BYTES and total_results <= MAX_RESULTS:
                  continue

              # Truncate: sort by severity, keep top MAX_RESULTS
              for run in sarif.get("runs", []):
                  results = run.get("results", [])
                  results.sort(key=lambda r: SEVERITY_ORDER.get(r.get("level", "none"), 4))
                  shown = min(len(results), MAX_RESULTS)
                  run["results"] = results[:shown]

                  # Add truncation warning
                  run["results"].append({
                      "ruleId": "scan-truncation-warning",
                      "level": "warning",
                      "message": {
                          "text": f"Scan results truncated: {total_results} findings found, showing top {shown} by severity. Run locally for full results."
                      },
                      "locations": []
                  })

              with open(sarif_file, "w") as f:
                  json.dump(sarif, f, indent=2)
              print(f"Truncated {sarif_file}: {total_results} -> {shown} results")
          PYTHON_SCRIPT

      - name: Upload Trivy IaC SARIF
        id: upload-trivy-iac
        if: always()
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        with:
          sarif_file: scan-artifacts/trivy-results/trivy-iac-results.sarif
          category: trivy-iac
        continue-on-error: true

      - name: Upload Trivy Secrets SARIF
        id: upload-trivy-secrets
        if: always()
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        with:
          sarif_file: scan-artifacts/trivy-results/trivy-secrets-results.sarif
          category: trivy-secrets
        continue-on-error: true

      - name: Upload Checkov SARIF
        id: upload-checkov
        if: always()
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        with:
          sarif_file: scan-artifacts/checkov-results/checkov-results.sarif
          category: checkov
        continue-on-error: true

      - name: Upload Snyk IaC SARIF
        id: upload-snyk
        if: always() && hashFiles('scan-artifacts/snyk-results/snyk-iac-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        with:
          sarif_file: scan-artifacts/snyk-results/snyk-iac-results.sarif
          category: snyk-iac
        continue-on-error: true

      - name: Set upload output
        id: set-output
        if: always()
        run: |
          if [[ "${{ steps.upload-trivy-iac.outcome }}" == "success" ]] || \
             [[ "${{ steps.upload-trivy-secrets.outcome }}" == "success" ]] || \
             [[ "${{ steps.upload-checkov.outcome }}" == "success" ]] || \
             [[ "${{ steps.upload-snyk.outcome }}" == "success" ]]; then
            echo "sarif-uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "sarif-uploaded=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # PR COMMENT
  # Post findings summary as PR comment (always new comment)
  # ==========================================================================
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    needs: aggregate
    if: always() && inputs.post-pr-comment && github.event_name == 'pull_request'
    steps:
      - name: Download aggregated results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: aggregated-results
          path: aggregated/

      - name: Post PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const fs = require('fs');
            let data = {};
            try {
              data = JSON.parse(fs.readFileSync('aggregated/aggregated.json', 'utf8'));
            } catch (e) {
              data = { total_findings: 0, by_severity: {}, suppressions_applied: 0, baseline_filtered: 0, findings: [] };
            }

            const sev = data.by_severity || {};
            const critical = sev.CRITICAL || 0;
            const high = sev.HIGH || 0;
            const medium = sev.MEDIUM || 0;
            const low = sev.LOW || 0;
            const total = data.total_findings || 0;
            const suppressed = data.suppressions_applied || 0;
            const baselined = data.baseline_filtered || 0;
            // Gate on BLOCKING severities (CRITICAL + HIGH) only — matches the Aggregate gate.
            const passed = (critical + high) === 0;

            // Build top findings table (max 20)
            const activeFindings = (data.findings || [])
              .filter(f => !f.suppressed && !f.baseline)
              .sort((a, b) => {
                const order = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
                return (order[a.severity] || 4) - (order[b.severity] || 4);
              })
              .slice(0, 20);

            let findingsTable = '';
            if (activeFindings.length > 0) {
              findingsTable = '| File | Rule | Severity | Tool | Remediation |\n';
              findingsTable += '|------|------|----------|------|-------------|\n';
              for (const f of activeFindings) {
                const remediation = f.remediation_url ? `[Link](${f.remediation_url})` : 'N/A';
                findingsTable += `| ${f.file} | ${f.rule_id} | ${f.severity} | ${f.tool} | ${remediation} |\n`;
              }
            }

            const statusIcon = passed ? ':white_check_mark:' : ':x:';
            const body = `## Security Scan Results

            | Severity | Count |
            |----------|-------|
            | CRITICAL | ${critical} |
            | HIGH     | ${high} |
            | MEDIUM   | ${medium} |
            | LOW      | ${low} |

            **Tools**: Trivy, Checkov, tflint
            **Suppressions applied**: ${suppressed}
            **Baseline filtered**: ${baselined}

            ${total > 0 ? `<details>
            <summary>Top findings (click to expand)</summary>

            ${findingsTable}

            </details>` : ''}

            ${statusIcon} ${passed ? 'All security checks passed!' : `**${total} security findings detected.** Please review.`}
            `.replace(/^            /gm, '');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ==========================================================================
  # METRICS
  # Upload metrics artifact
  # ==========================================================================
  metrics:
    name: Upload Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: aggregate
    if: always() && inputs.upload-metrics
    steps:
      - name: Download aggregated results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: aggregated-results
          path: aggregated/

      - name: Generate metrics
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          from datetime import datetime, timezone

          data = {}
          try:
              with open("aggregated/aggregated.json") as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError):
              pass

          metrics = {
              "schema_version": "1.0",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "branch": os.environ.get("GITHUB_HEAD_REF", os.environ.get("GITHUB_REF_NAME", "")),
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "cloud_provider": "${{ inputs.cloud-provider }}",
              "aggregate": {
                  "total_findings": data.get("total_findings", 0),
                  "by_severity": data.get("by_severity", {}),
                  "suppressed_count": data.get("suppressions_applied", 0),
                  "baselined_count": data.get("baseline_filtered", 0)
              }
          }

          os.makedirs(".scan-results/metrics", exist_ok=True)
          date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          with open(f".scan-results/metrics/scan-metrics.json", "w") as f:
              json.dump(metrics, f, indent=2)
          PYTHON_SCRIPT

      - name: Upload metrics artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scan-metrics-${{ inputs.cloud-provider }}-${{ github.run_id }}
          path: .scan-results/metrics/scan-metrics.json
          retention-days: 90
