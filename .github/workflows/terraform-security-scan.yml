# ============================================================================
# SECURITY SCANNING WORKFLOW
# azure-wordpress
#
# This workflow runs security scans on Terraform code in CI/CD pipeline.
# Scans run on every PR and push to main branch.
#
# Tools:
#   - Trivy: IaC misconfigurations and secret detection
#   - Checkov: AWS CIS Benchmark policy validation
#
# Results are uploaded to GitHub Security tab via SARIF format.
# ============================================================================

name: Security Scan

on:
  pull_request:
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'
      - '.checkov.yaml'
      - '.trivyignore'
      - '.tflint.hcl'
  push:
    branches:
      - main
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'

# Limit concurrent runs for the same branch
concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ==========================================================================
  # TRIVY IaC SECURITY SCAN
  # Scans for misconfigurations and secrets in Terraform files
  # ==========================================================================
  trivy-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          scan-type: 'config'
          scan-ref: 'terraform'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          trivyignores: '.trivyignore'
          skip-dirs: '.terraform,examples,tests'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-iac'

      - name: Run Trivy secret scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          scan-type: 'fs'
          scanners: 'secret'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-secrets.sarif'

      - name: Upload Trivy Secrets SARIF
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        if: always()
        with:
          sarif_file: 'trivy-secrets.sarif'
          category: 'trivy-secrets'

  # ==========================================================================
  # CHECKOV POLICY SCAN
  # Validates Terraform against AWS CIS Benchmark policies
  # ==========================================================================
  checkov-scan:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf  # v12.1347.0
        with:
          directory: terraform
          config_file: .checkov.yaml
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          download_external_modules: false

      - name: Upload Checkov SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a  # v3.32.2
        if: always()
        with:
          sarif_file: 'checkov-results.sarif'
          category: 'checkov'

  # ==========================================================================
  # TFLINT TERRAFORM LINTING
  # Validates Terraform best practices and AWS-specific rules
  # ==========================================================================
  tflint-scan:
    name: TFLint Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6  # v4.1.1
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init --config=.tflint.hcl

      - name: Run TFLint
        run: |
          find terraform -name "*.tf" -type f -exec dirname {} \; | sort -u | while read dir; do
            echo "::group::Scanning $dir"
            tflint --config=.tflint.hcl --chdir="$dir" --format=compact || exit 1
            echo "::endgroup::"
          done

  # ==========================================================================
  # SECURITY SUMMARY
  # Aggregates results and posts summary to PR
  # ==========================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, checkov-scan, tflint-scan]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Check scan results
        run: |
          if [ "${{ needs.trivy-scan.result }}" == "failure" ] || \
             [ "${{ needs.checkov-scan.result }}" == "failure" ] || \
             [ "${{ needs.tflint-scan.result }}" == "failure" ]; then
            echo "::error::Security scans failed. Please review findings in the Security tab."
            exit 1
          fi
          echo "::notice::All security scans passed!"

      - name: Post PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        if: always()
        with:
          script: |
            const trivyStatus = '${{ needs.trivy-scan.result }}' === 'success' ? '✅' : '❌';
            const checkovStatus = '${{ needs.checkov-scan.result }}' === 'success' ? '✅' : '❌';
            const tflintStatus = '${{ needs.tflint-scan.result }}' === 'success' ? '✅' : '❌';

            const body = `## Security Scan Results

            | Tool | Status | Description |
            |------|--------|-------------|
            | Trivy | ${trivyStatus} | IaC misconfigurations & secrets |
            | Checkov | ${checkovStatus} | AWS CIS Benchmark policies |
            | TFLint | ${tflintStatus} | Terraform best practices |

            ${trivyStatus === '❌' || checkovStatus === '❌' || tflintStatus === '❌' ?
              '⚠️ **Security issues detected.** Please review the [Security tab](../../security) for details.' :
              '✅ **All security checks passed!**'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
